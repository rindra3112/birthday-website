<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="description" content="Happy Birthday Capii ❤️">

    <title>Happy Birthday Capii ❤️</title>

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Great+Vibes&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- Floating Hearts -->

    <div class="heart h1">🤍</div>
    <div class="heart h2">💖</div>
    <div class="heart h3">💕</div>
    <div class="heart h4">❤️</div>

    <!-- Login -->

    <div class="container">

        <div class="card">

            <h1>Happy Birthday</h1>

            <div class="love">
            </div>

            <h2 class="subtitle">
                Capii Imupp
            </h2>

            <p class="hint">

                Passwordnya adalah...

                <br><br>

                Sering ata tulis di chat dan bilang ke capii❤️

            </p>

            <input
                type="password"
                id="password"
                maxlength="30"
                autocomplete="off"
                placeholder="Jawabanmu di sini ❤️">

            <button onclick="checkPassword()">

                Masuk 💖

            </button>

            <p class="error" id="error"></p>

            <div class="footer">

                Made with ❤️ by Ata

            </div>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
