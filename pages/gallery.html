<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Gallery ❤️</title>

    <link rel="stylesheet" href="../style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Great+Vibes&display=swap" rel="stylesheet">

</head>

<body>

    <!-- Musik -->
    <audio id="galleryMusic" loop preload="auto">
        <source src="../assets/music/gallery.mp3" type="audio/mpeg">
    </audio>

    <div class="gallery-page">

        <h1>Our Memories ❤️</h1>

        <p>Foto kita yang selalu bikin senyum 😊</p>

        <div class="gallery">

            <div class="photo">
                <img src="../assets/images/foto1.jpg" alt="Foto 1">
                <span>Capii Imupp ❤️</span>
            </div>

            <div class="photo">
                <img src="../assets/images/foto2.jpg" alt="Foto 2">
                <span>Makan Dubai Cukuwiki 🍴</span>
            </div>

            <div class="photo">
                <img src="../assets/images/foto3.jpg" alt="Foto 3">
                <span>Capii Peluk Ata Bear 🧸</span>
            </div>

            <div class="photo">
                <img src="../assets/images/foto4.jpg" alt="Foto 4">
                <span>Nunggu SSB ⚽</span>
            </div>

            <div class="photo">
                <img src="../assets/images/foto5.jpg" alt="Foto 5">
                <span>Pertama Selfie 📸</span>
            </div>

            <div class="photo">
                <img src="../assets/images/foto6.jpg" alt="Foto 6">
                <span>Emote Capii 🥰</span>
            </div>

        </div>

        <button onclick="goToLetter()">
            Lanjut 💌
        </button>

    </div>

<script>

const music = document.getElementById("galleryMusic");

music.volume = 0.35;

// Mencegah play dipanggil berkali-kali
let musicStarted = false;

function playMusic(){

    if(musicStarted) return;

    musicStarted = true;

    music.play().catch(() => {

        console.log("Browser memerlukan interaksi pengguna.");

    });

}

// Coba autoplay (desktop)
window.addEventListener("load", playMusic);

// Jika autoplay diblokir, interaksi pertama akan memulai musik
document.addEventListener("pointerdown", playMusic, { once:true });

function goToLetter(){

    music.pause();
    music.currentTime = 0;

    window.location.href = "letter.html";

}

</script>

</body>
</html>
