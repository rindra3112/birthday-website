<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Happy Birthday ❤️</title>

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Great+Vibes&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="../style.css">

</head>

<body>

    <!-- Musik -->
    <audio id="bgMusic" loop>
        <source src="../assets/music/lagu1.mp3" type="audio/mpeg">
    </audio>

    <!-- Floating Hearts -->
    <div class="heart h1">🤍</div>
    <div class="heart h2">💖</div>
    <div class="heart h3">💕</div>
    <div class="heart h4">❤️</div>

    <section class="birthday-page">

        <div class="birthday-card">

            <div class="birthday-icon">
                🎂
            </div>

            <h3>Happy Birthday</h3>

            <h1>Capii Imupp ❤️</h1>

            <p id="typing"></p>

            <button onclick="startMusic()">
                Lihat Kenangan 📸
            </button>

        </div>

    </section>

    <script src="../script.js"></script>

    <script>

        const music = document.getElementById("bgMusic");

        function startMusic(){

            music.play();

            setTimeout(()=>{

                window.location.href="gallery.html";

            },500);

        }

        // Jika browser mengizinkan autoplay
        window.addEventListener("load",()=>{

            music.play().catch(()=>{

                console.log("Browser menunggu interaksi pengguna.");

            });

        });

    </script>

</body>
</html>
